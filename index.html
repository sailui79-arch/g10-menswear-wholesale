<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="G-10 menswear wholesale mobile catalog for Myanmar buyers."
    />
    <title>G-10 Menswear</title>
    <link rel="stylesheet" href="./styles.css?v=20260711-direct-download" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <button class="back-button" id="backButton" type="button" aria-label="Back">‹</button>
        <div>
          <p id="pageKicker">MEN'S WHOLESALE</p>
          <h1 id="pageTitle">G-10</h1>
        </div>
        <div class="header-spacer" aria-hidden="true"></div>
      </header>

      <section class="view active" id="homeView" aria-label="Home">
        <div class="hero-card">
          <div class="brand-mark">G-10</div>
          <div>
            <strong>Menswear Catalog</strong>
            <span>မြန်မာလက်ကားဝယ်သူများအတွက် အမျိုးအစားရွေးပါ</span>
          </div>
        </div>

        <section class="home-section">
          <div class="section-head">
            <h2>Categories</h2>
            <p>အမျိုးအစားရွေးပါ</p>
          </div>
          <div class="category-grid" id="categoryGrid"></div>
        </section>
      </section>

      <section class="view" id="categoryView" aria-label="Products">
        <div class="category-summary">
          <strong id="categoryName">Category</strong>
          <span id="categoryCount">0 products</span>
        </div>
        <div class="product-list" id="productList"></div>
      </section>

      <section class="view photo-view" id="photoView" aria-label="Original product photo">
        <img class="original-photo" id="originalPhoto" src="" alt="" />
        <button class="download-photo" id="downloadPhoto" type="button">
          <span aria-hidden="true">⇩</span>
          Download / ဒေါင်းလုဒ်
        </button>
      </section>

    </main>

    <script src="./products.js?v=20260711-folder-22"></script>
    <script src="./script.js?v=20260711-direct-download"></script>
  </body>
</html>
