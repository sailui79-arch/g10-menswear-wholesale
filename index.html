<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="description"
      content="G-10 menswear wholesale mobile catalog for Myanmar buyers."
    />
    <title>G-10 Menswear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,0,0"
    />
    <link rel="stylesheet" href="./styles.css?v=20260721-native-photo-gallery" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <button class="back-button" id="backButton" type="button" aria-label="Back">‹</button>
        <div>
          <p id="pageKicker">MEN'S WHOLESALE</p>
          <h1 id="pageTitle">G-10</h1>
        </div>
        <button class="cart-icon" id="headerCart" type="button" aria-label="Selected products">
          <span id="headerCartCount">0</span>
        </button>
      </header>

      <section class="view active" id="homeView" aria-label="Home">
        <div class="hero-card">
          <div class="brand-mark">G-10</div>
          <div>
            <strong>Menswear Catalog</strong>
            <span class="contact-line">13628871555 · 18313489500 · WeChat</span>
          </div>
        </div>

        <section class="home-section">
          <div class="section-head">
            <h2>Categories</h2>
            <p>အမျိုးအစားရွေးပါ</p>
          </div>
          <div class="category-grid" id="categoryGrid"></div>
        </section>
      </section>

      <section class="view" id="categoryView" aria-label="Products">
        <div class="category-summary">
          <strong id="categoryName">Category</strong>
          <span id="categoryCount">0 products</span>
        </div>
        <div class="product-list" id="productList"></div>
      </section>

      <section class="view photo-view" id="photoView" aria-label="Original product photo">
        <div class="photo-stage" id="photoStage">
          <img class="original-photo" id="originalPhoto" src="" alt="" />
        </div>
        <div class="photo-actions">
          <button class="photo-select-button" id="photoSelectButton" type="button" aria-label="Select product" title="Select product">
            <span class="material-symbols-rounded" aria-hidden="true">check</span>
          </button>
        </div>
      </section>

      <section class="view" id="cartView" aria-label="Selected products">
        <section class="customer-panel" aria-label="Customer information">
          <label>
            Customer name · နာမည်
            <input id="customerName" type="text" autocomplete="name" placeholder="Name" />
          </label>
          <label>
            Phone / WeChat
            <input id="customerPhone" type="text" autocomplete="tel" placeholder="Phone / WeChat" />
          </label>
        </section>

        <section class="cart-panel" aria-label="Selection list">
          <div class="cart-head">
            <div>
              <span>Selected Products</span>
              <strong id="cartSummary">0 products</strong>
            </div>
            <button id="clearCart" type="button">Clear</button>
          </div>
          <div class="cart-items" id="cartItems"></div>
          <label class="order-message">
            Note · မှတ်ချက်
            <textarea id="orderNote" rows="3" placeholder="Color, quantity, delivery note..."></textarea>
          </label>
          <div class="send-actions">
            <button id="submitOrder" type="button">ရွေးထားသည်များ ပို့မည် · Submit</button>
            <button id="copyOrder" type="button">Copy for WeChat</button>
          </div>
          <p class="order-status" id="orderStatus" role="status" aria-live="polite"></p>
        </section>
      </section>

      <div class="bottom-spacer" aria-hidden="true"></div>
    </main>

    <nav class="bottom-nav" aria-label="Main navigation">
      <button id="homeNav" type="button">Home</button>
      <button id="cartNav" type="button">Selected <strong id="stickyCount">0</strong></button>
    </nav>

  <script src="./products-20260720-catalog-by.js"></script>
    <script src="./script-20260720-back-swipe-100.js?v=20260721-tap-photo-to-exit"></script>
  </body>
</html>
