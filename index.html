<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="G-10 menswear wholesale mobile ordering page for Myanmar buyers."
    />
    <title>G-10 Mobile Order</title>
    <link rel="stylesheet" href="./styles.css?v=20260629-order" />
  </head>
  <body>
    <main class="app-shell">
      <header class="store-header">
        <div class="brand-mark" aria-hidden="true">G-10</div>
        <div>
          <p>MEN'S WHOLESALE</p>
          <h1>G-10</h1>
          <span>မြန်မာလက်ကားဝယ်သူများအတွက် တိုက်ရိုက်အော်ဒါတင်ရန်</span>
        </div>
      </header>

      <section class="order-note" aria-label="Order steps">
        <strong>Order Steps</strong>
        <span>1. အမျိုးအစားရွေးပါ  2. Size / Qty ဖြည့်ပါ  3. Add နှိပ်ပါ  4. Send Order</span>
      </section>

      <nav class="category-tabs" aria-label="Product categories"></nav>

      <section class="customer-panel" aria-label="Customer information">
        <label>
          Customer name
          <input id="customerName" type="text" autocomplete="name" placeholder="နာမည်" />
        </label>
        <label>
          Phone
          <input id="customerPhone" type="tel" autocomplete="tel" placeholder="ဖုန်းနံပါတ်" />
        </label>
      </section>

      <section class="toolbar" aria-label="Product tools">
        <div>
          <strong id="activeCategoryName">All</strong>
          <span id="productCount">0 items</span>
        </div>
        <button class="ghost-button" id="clearFilter" type="button">All</button>
      </section>

      <section class="product-list" id="productList" aria-label="Products"></section>

      <section class="cart-panel" id="cartPanel" aria-label="Order cart">
        <div class="cart-head">
          <div>
            <span>My Order</span>
            <strong id="cartSummary">0 items</strong>
          </div>
          <button id="clearCart" type="button">Clear</button>
        </div>
        <div class="cart-items" id="cartItems">
          <p class="empty-cart">Select products above. အပေါ်မှ ပစ္စည်းရွေးပါ။</p>
        </div>
        <label class="order-message">
          Note
          <textarea id="orderNote" rows="2" placeholder="Color, address, delivery note..."></textarea>
        </label>
        <div class="send-actions">
          <a id="sendWhatsapp" href="#" target="_blank" rel="noreferrer">WhatsApp Send Order</a>
          <button id="copyOrder" type="button">Copy Order Text</button>
        </div>
      </section>

      <div class="bottom-spacer" aria-hidden="true"></div>
    </main>

    <div class="sticky-order">
      <button id="openCart" type="button">
        <span>Order List</span>
        <strong id="stickyCount">0</strong>
      </button>
    </div>

    <script src="./products.js?v=20260629-order"></script>
    <script src="./script.js?v=20260629-order"></script>
  </body>
</html>
